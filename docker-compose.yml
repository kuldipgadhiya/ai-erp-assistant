services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ai_erp_app
    working_dir:  /var/www
    volumes:  
      - ./:/var/www

  nginx:
    image:  nginx:latest
    container_name: ai_erp_nginx
    ports: 
      - "8001:80"
    volumes:  
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  mysql:
    image: mysql:8
    container_name: ai_erp_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ai_erp
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "33006:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: